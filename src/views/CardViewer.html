<ion-page>
  <ion-content class="ion-padding deck-bg">
    <div class="deck-grid">
      <div v-for="(c, i) in cardsToShow" :key="i" class="deck-card-slot">
        <CardItem :card="c" :show-export="true" />
        <ion-button v-if="isHandMode" size="small" :disabled="!canPlayFromHand" @click="playFromHand(i)">Play</ion-button>
      </div>
    </div>
  </ion-content>
</ion-page>
