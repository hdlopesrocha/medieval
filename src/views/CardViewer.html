<ion-page>
  <ion-header>
    <ion-toolbar>
      <ion-title>{{ titleText }}</ion-title>
      <ion-buttons slot="end">
        <ion-button @click="goMain" color="medium">Back to Main</ion-button>
      </ion-buttons>
    </ion-toolbar>
  </ion-header>

  <ion-content class="ion-padding deck-bg">
    <CurrentPlayerBoard />
    <div class="deck-grid">
      <CardItem v-for="(c, i) in cardsToShow" :key="i" :card="c" :show-export="true" />
    </div>
  </ion-content>
</ion-page>
