<ion-popover :is-open="!!selectedCard"  @did-dismiss="onPopoverDismiss">
  <div class="map-card-overlay-wrap">
    
    <CardItem :card="selectedCard" :showExport="false" />
    
  </div>
  <div class="map-card-overlay-actions">
      <template v-if="isLocalPlayersTurn">
        <ion-button size="small" @click="moveSelectedCard">Move</ion-button>
        <ion-button size="small" @click="attackWithSelectedCard">Attack</ion-button>
        <ion-button size="small" @click="useSelectedAbility">Use</ion-button>
      </template>
  </div>
</ion-popover>

<ion-page>
    <div class="maps-row">
      <div class="map-surface">
        <div class="map-image-strip">
          <img
            v-for="(imgCfg, idx) in mapStripImages"
            :key="`map-img-${idx}`"
            :src="imgCfg.src"
            alt="map segment"
            :class="imgCfg.flipped ? 'map-image map-image-flipped' : 'map-image'"
          />
        </div>
        <div class="zones-overlay">
          <div v-for="zoneIdx in [0, 1, 2, 3, 4, 5, 6, 7]" 
            :key="`zone-${zoneIdx}`" 
            class="zone-cell" 
            :style="zoneStyle(zoneIdx)">
            <div class="zone-stack" 
              :style="zoneStackStyle(zoneIdx)">
              <div v-for="card in cardsForZone(zoneIdx)" 
                :key="`zone-${zoneIdx}-card`" 
                class="played-card">
                <MiniCardItem v-if="card" 
                :card="card" 
                @click="selectCard(card)" />
                <div v-else class="mini-card-fallback"></div>
              </div>
            </div>
            <div v-if="hiddenCountForZone(zoneIdx) > 0" class="zone-overflow-badge">
              +{{ hiddenCountForZone(zoneIdx) }}
            </div>
          </div>
        </div>
      </div>
    </div>

</ion-page>

<ConfirmActionModal 
  :visible="confirmVisible" 
  :title="confirmTitle" 
  :message="confirmMessage" 
  @confirm="onConfirm" 
  @cancel="onCancel" />
