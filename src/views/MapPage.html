<ion-popover :is-open="popoverOpen"  @did-dismiss="onPopoverDismiss">
  <div class="map-card-overlay-wrap">
    
    <CardItem v-if="selectedCard" :card="selectedCard" :showExport="false" />
    
  </div>
  <div class="map-card-overlay-actions">
      <template v-if="selectedCanAct && isLocalPlayersTurn">
        <ion-button size="small" @click="moveSelectedCard">Move</ion-button>
        <ion-button size="small" @click="attackWithSelectedCard">Attack</ion-button>
        <ion-button size="small" v-if="selectedCard && selectedCard.category === 'priest' && canConvert(selectedEntry)" @click="convertWithSelectedCard">Convert</ion-button>
        <ion-button size="small" @click="useSelectedAbility">Use</ion-button>
      </template>
  </div>
</ion-popover>

<ion-page>
    <div class="maps-row">
      <div class="map-surface">
        <div class="map-image-strip">
          <img
            v-for="(imgCfg, idx) in mapStripImages"
            :key="`map-img-${idx}`"
            :src="imgCfg.src"
            alt="map segment"
            :class="imgCfg.flipped ? 'map-image map-image-flipped' : 'map-image'"
          />
        </div>
        <div class="zones-overlay">
          <div v-for="zoneIdx in 8" :key="`zone-${zoneIdx}`" class="zone-cell" :style="zoneStyle(zoneIdx - 1)">
            <div class="zone-stack" :style="zoneStackStyle(zoneIdx - 1)">
              <div v-for="entry in cardsForZone(zoneIdx - 1)" :key="`zone-${zoneIdx}-card-${entry.id}`" class="played-card">
                <MiniCardItem v-if="entry.card" :card="entry.card" @select="selectCard(entry)" />
                <div v-else class="mini-card-fallback"></div>
              </div>
            </div>
            <div v-if="hiddenCountForZone(zoneIdx - 1) > 0" class="zone-overflow-badge">
              +{{ hiddenCountForZone(zoneIdx - 1) }}
            </div>
          </div>
        </div>
      </div>
    </div>

    <div v-if="cardsInPlayCount === 0" style="margin-top:8px;color:#666">No played cards yet. Play from hand first.</div>
</ion-page>

<ConfirmActionModal :visible="confirmVisible" :title="confirmTitle" :message="confirmMessage" @confirm="onConfirm" @cancel="onCancel" />
