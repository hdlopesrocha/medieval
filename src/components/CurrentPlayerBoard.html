<div class="current-player-board">
  <nav class="current-player-navbar" aria-label="Primary">
    <div class="current-player-navbar-links">
      <ion-button size="big" :fill="isActive('/') ? 'solid' : 'outline'" @click="go('/')">
        <ion-icon slot="start" :icon="homeOutline"></ion-icon>
      </ion-button>
      <ion-button size="big" :fill="isActive('/deck') ? 'solid' : 'outline'" @click="go('/deck')">
        <ion-icon slot="start" :icon="albumsOutline"></ion-icon>
      </ion-button>
      <ion-button size="big" :fill="isActive('/hand') ? 'solid' : 'outline'" @click="go('/hand')">
        <ion-icon slot="start" :icon="handLeftOutline"></ion-icon>
      </ion-button>
      <!-- Board removed; link to Map instead -->
      <ion-button size="big" :fill="isActive('/map') ? 'solid' : 'outline'" @click="go('/map')">
        <ion-icon slot="start" :icon="mapOutline"></ion-icon>
      </ion-button>
    </div>
    <div class="settings-menu-wrap">
      <ion-button :id="settingsTriggerId" size="big" fill="outline">
        <ion-icon slot="start" :icon="settingsOutline"></ion-icon>
      </ion-button>
      <ion-popover
        :trigger="settingsTriggerId"
        trigger-action="click"
        side="bottom"
        alignment="end"
        :dismiss-on-select="true"
      >
      <div class="settings-menu">
        <ion-button v-if="isLocalPlayersTurn" size="small" color="success" fill="clear" @click="createGameState">
          <ion-icon slot="start" :icon="addCircleOutline"></ion-icon>
          Create
        </ion-button>
        <!-- Home moved to the main navbar links -->
        <ion-button size="small" fill="clear" @click="goFromSettings('/history')">
          <ion-icon slot="start" :icon="timeOutline"></ion-icon>
          History
        </ion-button>
        <ion-button size="small" fill="clear" @click="goFromSettings('/share')">
          <ion-icon slot="start" :icon="shareSocialOutline"></ion-icon>
          Share
        </ion-button>
        <ion-button size="small" fill="clear" @click="toggleFullscreen">
          <ion-icon slot="start" :icon="fullscreenIcon"></ion-icon>
          {{ fullscreenLabel }}
        </ion-button>
        <ion-button v-if="boardVisible" size="small" fill="clear" style="margin-top: 8px;" @click="toggleBoardVisible">
          <ion-icon slot="start" :icon="contractOutline"></ion-icon>
          Hide Player Board
        </ion-button>
        <ion-button v-if="!boardVisible" size="small" fill="dark" style="margin-top: 8px;" @click="toggleBoardVisible">
          <ion-icon slot="start" :icon="expandOutline"></ion-icon>
          Show Player Board
        </ion-button>
        <ion-button size="small" color="danger" fill="clear" style="margin-top: 8px;" @click="clearLocalStorage">
          <ion-icon slot="start" :icon="trashOutline"></ion-icon>
          Erase local storage
        </ion-button>
      </div>
      </ion-popover>
    </div>
  </nav>

  <div class="current-player-board-row minimal">
    <span class="cpb-item"><ion-icon name="person-outline" style="vertical-align: middle; margin-right: 6px;"></ion-icon> {{ currentPlayerLabel }}</span>
    <span class="cpb-item"><ion-icon name="shield-half-outline" style="vertical-align: middle; margin-right: 6px;"></ion-icon> {{ playerCastleHp }}</span>
    <span class="cpb-item"><ion-icon name="shield-outline" style="vertical-align: middle; margin-right: 6px;"></ion-icon> {{ enemyCastleHp }}</span>
    <span class="cpb-item"><ion-icon name="time-outline" style="vertical-align: middle; margin-right: 6px;"></ion-icon> {{ turnLabel }}</span>
  </div>
</div>
