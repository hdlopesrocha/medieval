

<ion-button v-if="!boardVisible" size="small" fill="dark" style="margin-bottom: 8px; background: #222; color: #fff;" @click="toggleBoardVisible">
  <ion-icon slot="start" :icon="expandOutline"></ion-icon>
  Show Player Board
</ion-button>

<div v-if="boardVisible" class="current-player-board">
  <nav class="current-player-navbar" aria-label="Primary">
    <div class="current-player-navbar-links">
      <ion-button size="small" :fill="isActive('/deck') ? 'solid' : 'outline'" @click="go('/deck')">
        <ion-icon slot="start" :icon="albumsOutline"></ion-icon>
        Deck
      </ion-button>
      <ion-button size="small" :fill="isActive('/hand') ? 'solid' : 'outline'" @click="go('/hand')">
        <ion-icon slot="start" :icon="handLeftOutline"></ion-icon>
        Hand
      </ion-button>
      <ion-button size="small" :fill="isActive('/table') ? 'solid' : 'outline'" @click="go('/table')">
        <ion-icon slot="start" :icon="gridOutline"></ion-icon>
        Table
      </ion-button>
      <ion-button size="small" :fill="isActive('/map') ? 'solid' : 'outline'" @click="go('/map')">
        <ion-icon slot="start" :icon="mapOutline"></ion-icon>
        Map
      </ion-button>
    </div>
    <div class="settings-menu-wrap">
      <ion-button :id="settingsTriggerId" size="small" fill="outline">
        <ion-icon slot="start" :icon="settingsOutline"></ion-icon>
        Settings
      </ion-button>
      <ion-popover
        :trigger="settingsTriggerId"
        trigger-action="click"
        side="bottom"
        alignment="end"
        :dismiss-on-select="true"
      >
      <div class="settings-menu">
        <ion-button v-if="showCreateButton" size="small" color="success" fill="clear" @click="createGameState">
          <ion-icon slot="start" :icon="addCircleOutline"></ion-icon>
          Create
        </ion-button>
        <ion-button size="small" fill="clear" @click="goFromSettings('/')">
          <ion-icon slot="start" :icon="homeOutline"></ion-icon>
          Home
        </ion-button>
        <ion-button size="small" fill="clear" @click="goFromSettings('/history')">
          <ion-icon slot="start" :icon="timeOutline"></ion-icon>
          History
        </ion-button>
        <ion-button size="small" fill="clear" @click="goFromSettings('/share')">
          <ion-icon slot="start" :icon="shareSocialOutline"></ion-icon>
          Share
        </ion-button>
        <ion-button size="small" fill="clear" @click="toggleFullscreen">
          <ion-icon slot="start" :icon="fullscreenIcon"></ion-icon>
          {{ fullscreenLabel }}
        </ion-button>
        <ion-button v-if="boardVisible" size="small" fill="clear" style="margin-top: 8px;" @click="toggleBoardVisible">
          <ion-icon slot="start" :icon="contractOutline"></ion-icon>
          Hide Player Board
        </ion-button>
        <ion-button v-if="!boardVisible" size="small" fill="dark" style="margin-top: 8px;" @click="toggleBoardVisible">
          <ion-icon slot="start" :icon="expandOutline"></ion-icon>
          Show Player Board
        </ion-button>
      </div>
      </ion-popover>
    </div>
  </nav>

  <div class="current-player-board-row">
    <div><strong>Player:</strong> {{ ownerPlayerId }}</div>
    <div><strong>Round:</strong> {{ roundNumber }}</div>
    <div><strong>Player Castle HP:</strong> {{ playerCastleHp }}</div>
    <div><strong>Enemy Castle HP:</strong> {{ enemyCastleHp }}</div>
    <div><strong>{{ turnIcon }}</strong> {{ turnLabel }}</div>
  </div>
</div>
